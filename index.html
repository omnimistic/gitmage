<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitMage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        
        <h1 data-shadow='GitMage!'>GitMage!</h1>
        
        <div class="input-area">
            <input type="text" id="player1" placeholder="Mage 1 (e.g., torvalds)" autocomplete="off">
            <span class="vs">VS</span>
            <input type="text" id="player2" placeholder="Mage 2 (e.g., octocat)" autocomplete="off">
        </div>
        
        <button id="summon-btn">BATTLE</button>

    </div>

    <script src="app.js"></script>
</body>
</html>
